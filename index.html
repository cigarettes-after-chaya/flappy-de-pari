<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: manipulation;
  }
  #gameContainer {
    position: relative;
    border: 3px solid #0f3460;
    box-shadow: 0 0 40px rgba(15, 52, 96, 0.8);
  }
  canvas {
    display: block;
    background: linear-gradient(#4ec0ca, #a9e4eb);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    background: rgba(0,0,0,0.4);
    cursor: pointer;
  }
  #overlay h1 { font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px #000; }
  #overlay p { font-size: 16px; opacity: 0.9; }
  #scoreDisplay {
    position: absolute;
    top: 15px; left: 0; right: 0;
    text-align: center;
    font-size: 40px;
    color: #fff;
    text-shadow: 2px 2px #000;
    font-weight: bold;
    pointer-events: none;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="360" height="560"></canvas>
  <div id="scoreDisplay">0</div>
  <div id="overlay">
    <h1 id="overlayTitle">Flappy Bird</h1>
    <p id="overlaySub">Tap, click, or press Space to start</p>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const scoreDisplay = document.getElementById('scoreDisplay');

const W = canvas.width, H = canvas.height;

// ---- Tunables (why: exposing these makes the game easy to rebalance) ----
const GRAVITY = 0.45;
const FLAP_STRENGTH = -7.6;
const PIPE_WIDTH = 60;
const PIPE_GAP = 150;
const PIPE_SPEED = 2.6;
const PIPE_SPAWN_INTERVAL = 90; // frames
const GROUND_HEIGHT = 70;

let bird, pipes, frame, score, best, state; // state: 'ready' | 'playing' | 'dead'

// ---- Assets ----
// Put these files in the SAME folder as index.html in your repo.
const birdImg = new Image();
birdImg.src = 'ccb.jpg';

const flapSound = new Audio('flap.ogg');
flapSound.volume = 0.8;

const hitSound = new Audio('hit.mp3');
hitSound.volume = 0.9;

function playFlapSound() {
  // why: cloning lets rapid taps overlap instead of cutting each other off
  const s = flapSound.cloneNode();
  s.volume = flapSound.volume;
  s.play().catch(() => {}); // ignore autoplay-block errors before first user gesture
}

function loadBest() {
  return parseInt(localStorage.getItem('flappyBest') || '0', 10);
}
function saveBest(v) {
  localStorage.setItem('flappyBest', v);
}

function reset() {
  bird = { x: 80, y: H / 2, vy: 0, r: 13, rotation: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  best = loadBest();
  state = 'ready';
  scoreDisplay.textContent = '0';
}

function spawnPipe() {
  const minTop = 40;
  const maxTop = H - GROUND_HEIGHT - PIPE_GAP - 40;
  const topHeight = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
  pipes.push({ x: W, top: topHeight, passed: false });
}

function flap() {
  if (state === 'ready') {
    state = 'playing';
    overlay.classList.add('hidden');
  }
  if (state === 'playing') {
    bird.vy = FLAP_STRENGTH;
    playFlapSound();
  }
  if (state === 'dead') {
    reset();
  }
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function update() {
  if (state !== 'playing') return;

  frame++;
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.max(-0.5, Math.min(1.2, bird.vy / 10));

  if (frame % PIPE_SPAWN_INTERVAL === 0) spawnPipe();

  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
      scoreDisplay.textContent = score;
    }
  }
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -5);

  // Collisions: ground / ceiling
  if (bird.y + bird.r >= H - GROUND_HEIGHT || bird.y - bird.r <= 0) {
    return die();
  }

  // Collisions: pipes
  for (const p of pipes) {
    const birdBox = { x: bird.x - bird.r, y: bird.y - bird.r, w: bird.r * 2, h: bird.r * 2 };
    const topPipe = { x: p.x, y: 0, w: PIPE_WIDTH, h: p.top };
    const botPipe = { x: p.x, y: p.top + PIPE_GAP, w: PIPE_WIDTH, h: H };
    if (rectsOverlap(birdBox.x, birdBox.y, birdBox.w, birdBox.h, topPipe.x, topPipe.y, topPipe.w, topPipe.h) ||
        rectsOverlap(birdBox.x, birdBox.y, birdBox.w, birdBox.h, botPipe.x, botPipe.y, botPipe.w, botPipe.h)) {
      return die();
    }
  }
}

function die() {
  state = 'dead';
  hitSound.currentTime = 0;
  hitSound.play().catch(() => {});
  if (score > best) {
    best = score;
    saveBest(best);
  }
  overlayTitle.textContent = 'Game Over';
  overlaySub.textContent = `Score: ${score}  |  Best: ${best}  —  tap to retry`;
  overlay.classList.remove('hidden');
}

function drawBackgroundDetails() {
  // ground
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);
  ctx.fillStyle = '#c9b969';
  ctx.fillRect(0, H - GROUND_HEIGHT, W, 8);
}

function drawPipes() {
  ctx.fillStyle = '#4caf50';
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 3;
  for (const p of pipes) {
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.fillRect(p.x, p.top + PIPE_GAP, PIPE_WIDTH, H - (p.top + PIPE_GAP) - GROUND_HEIGHT);
    ctx.strokeRect(p.x, p.top + PIPE_GAP, PIPE_WIDTH, H - (p.top + PIPE_GAP) - GROUND_HEIGHT);
    // caps
    ctx.fillStyle = '#66bb6a';
    ctx.fillRect(p.x - 3, p.top - 18, PIPE_WIDTH + 6, 18);
    ctx.fillRect(p.x - 3, p.top + PIPE_GAP, PIPE_WIDTH + 6, 18);
    ctx.strokeRect(p.x - 3, p.top - 18, PIPE_WIDTH + 6, 18);
    ctx.strokeRect(p.x - 3, p.top + PIPE_GAP, PIPE_WIDTH + 6, 18);
    ctx.fillStyle = '#4caf50';
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);
  const size = bird.r * 2.4; // slightly bigger than the hitbox so the image isn't cropped-looking
  if (birdImg.complete && birdImg.naturalWidth > 0) {
    ctx.drawImage(birdImg, -size / 2, -size / 2, size, size);
  } else {
    // fallback while bird.jpg is missing/loading, so you always see something
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath();
    ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawPipes();
  drawBackgroundDetails();
  drawBird();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---- Input ----
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});
canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
overlay.addEventListener('click', flap);
overlay.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

reset();
loop();
</script>

</body>
</html>
